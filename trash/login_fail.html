<script language="javascript">
var useraccount=null;
var p="window";
var pt="";

if(window.parent!=window || eval(p+".dialogArguments")!=undefined){
	for(var i=0;i<20;i++){
		try{
			if(eval(p+pt+".dialogArguments")==undefined){
				pt+=".parent";
				useraccount=eval(p+pt+".getUseraccount()");
			}else{
				pt+=".dialogArguments";
				useraccount=eval(p+pt+".getUseraccount()");
			}
			break;
		}catch(e){}
	}
}

function onSubmint(){
	if (document.frm.userAccount.value == "" || document.frm.userPassword.value == "" ){
		alert("请输入完整的登陆信息！");
		document.frm.userAccount.focus();
		document.frm.userAccount.select();
	    return false;
  	}

    
    //获取后台发送的验证码
    var url="/Logon.do?method=logon&flag=sess";
    var ajax=new Ajax.Request(url,
					{ method:'post',
					  asynchronous:false,
					  onSuccess:function(response){							
					if(response.responseText=='no')
					{
					 return false;
					 
					}else{ 
					     var scode=response.responseText.split("#")[0];
					     var sxh=response.responseText.split("#")[1];
					     var code=document.getElementById("userAccount").value+'%%%'+document.getElementById("userPassword").value;
						 var encoded='';
						 for(var i=0;i<code.length;i++){
						  if(i<20){
						    encoded=encoded+code.substring(i,i+1)+scode.substring(0,parseInt(sxh.substring(i,i+1)));
						    scode = scode.substring(parseInt(sxh.substring(i,i+1)),scode.length);
						  }else{
						    encoded=encoded+code.substring(i,code.length);
						    i=code.length; 
						  }
						 }
						 
						 document.getElementById("encoded").value=encoded;
						 
						 }	
					}
					});
    

  	if(useraccount!=null)
  		document.frm.target="frmIframe";
  	if(useraccount!=null && useraccount!=document.frm.USERNAME.value){
  		if(window.confirm("系统检查到您两次登录的账号不一致，是否确定用新账号登录？")){
 			var ppt=p+pt;
 			while(ppt.lastIndexOf('.')!=-1){
 				ppt=ppt.substring(0,ppt.lastIndexOf('.'));
 				eval(ppt+".close()");
 			}
  			eval(p+pt+".reloadmian()");
  		}else{
  			document.frm.reset();
  		}
  		return false;
  	}
  	
  	//判断是否启用进入选课系统
  	var xkxt_sel = document.getElementById("xkxt_sel");
  	if(!xkxt_sel.checked){
  		return true;
  	}
  	document.frm.action = selectServer(document.frm.USERNAME.value);
  	
  	
  	
    return true;
}

window.onload = function(){
	document.getElementById('userAccount').focus();
}


//根据用户帐号选择登录服务器
function selectServer(uName){
	var enableServers = true;//是否启用多服务器 true/false
	var serversArray = new Array();//服务器列表

	
		serversArray[0] = "http://202.204.121.78:8080/jsxsd/";
	
		serversArray[1] = "http://202.204.121.78:80/jsxsd/";
	
		serversArray[2] = "http://202.204.121.79:89/jsxsd/";
	
		serversArray[3] = "http://127.0.0.1:8080/jsxsd/";
	

	var loginUrl = "xk/LoginToXk";
	if(enableServers == true){
		if(!isNaN(uName)){//必须为数字
			var modVal = eval(uName % serversArray.length);
			loginUrl = serversArray[modVal] + loginUrl;
		}else{
			loginUrl = serversArray[0] + loginUrl;
		}
	}else{
		loginUrl = ""+ loginUrl;
	}
	return loginUrl;
}



</script>
